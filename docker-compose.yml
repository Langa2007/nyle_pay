

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nylepay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5638
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nylepay
      SPRING_REDIS_HOST: redis
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
  
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: fidellanga67@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 5638
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data: