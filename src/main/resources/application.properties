# Application
spring.application.name=nylepay
server.port=${PORT:8080}

# Checkout Page Domain (used for generating payment links)
nylepay.checkout.domain=${NYLEPAY_CHECKOUT_DOMAIN:http://localhost:8080}

# Admin Seed Account (injected from .env — never hardcode credentials)
admin.email=${ADMIN_EMAIL:}
admin.password=${ADMIN_PASSWORD:}
admin.full-name=${ADMIN_FULL_NAME:Admin User}

# Database (Neon Cloud)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# JPA
spring.jpa.open-in-view=false

# Security
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
security.encryption.secret-key=${SECURITY_ENCRYPTION_KEY}

# Routing Engine
nylepay.routing.home-country=${NYLEPAY_ROUTING_HOME_COUNTRY:KE}
nylepay.routing.sandbox=${NYLEPAY_SANDBOX_ENABLED:false}

# MPesa Configuration
mpesa.environment=${MPESA_ENVIRONMENT:sandbox}
mpesa.consumer-key=${MPESA_CONSUMER_KEY}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET}
mpesa.shortcode=${MPESA_SHORTCODE:174379}
mpesa.initiator-name=${MPESA_INITIATOR_NAME:nylepay}
mpesa.security-credential=${MPESA_SECURITY_CREDENTIAL:your-security-credential}
mpesa.passkey=${MPESA_PASSKEY}
mpesa.callback-url=${MPESA_CALLBACK_URL:https://yourdomain.com/api/payments/webhook/mpesa}
mpesa.result-url=${MPESA_RESULT_URL:https://yourdomain.com/api/payments/webhook/mpesa/result}
mpesa.timeout-url=${MPESA_TIMEOUT_URL:https://yourdomain.com/api/payments/webhook/mpesa/timeout}
mpesa.confirmation-url=${MPESA_CONFIRMATION_URL:https://yourdomain.com/api/payments/webhook/mpesa/confirmation}
mpesa.validation-url=${MPESA_VALIDATION_URL:https://yourdomain.com/api/payments/webhook/mpesa/validation}
mpesa.stk-transaction-type=CustomerPayBillOnline

# Airtel Money Configuration
airtel-money.client-id=${AIRTEL_MONEY_CLIENT_ID:}
airtel-money.client-secret=${AIRTEL_MONEY_CLIENT_SECRET:}
airtel-money.base-url=${AIRTEL_MONEY_BASE_URL:https://openapi.airtel.africa}
airtel-money.country=${AIRTEL_MONEY_COUNTRY:KE}
airtel-money.currency=${AIRTEL_MONEY_CURRENCY:KES}
airtel-money.callback-url=${AIRTEL_MONEY_CALLBACK_URL:https://yourdomain.com/api/payments/webhook/airtel-money}
airtel-money.live-mode=${AIRTEL_MONEY_LIVE_MODE:false}

# PesaLink / IPSL Configuration
pesalink.client-id=${PESALINK_CLIENT_ID:}
pesalink.client-secret=${PESALINK_CLIENT_SECRET:}
pesalink.base-url=${PESALINK_BASE_URL:https://sandbox.pesalink.co.ke}
pesalink.participant-id=${PESALINK_PARTICIPANT_ID:}
pesalink.callback-url=${PESALINK_CALLBACK_URL:https://yourdomain.com/api/payments/webhook/pesalink}
pesalink.live-mode=${PESALINK_LIVE_MODE:false}

# Email Configuration (Resend)
resend.api-key=${RESEND_API_KEY}
resend.from-email=onboarding@resend.dev

# Redis Configuration
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms
spring.data.redis.repositories.enabled=false

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=600000ms
spring.cache.redis.cache-null-values=false

# Logging
logging.level.com.nyle.nylepay=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://localhost:5173,http://localhost:5174,http://localhost:5500,http://127.0.0.1:5500,https://nylepay.com
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Sandbox Mode (safe simulated testing — no real money moves)
# Override to true via application-local.properties or environment variable
nylepay.sandbox.enabled=${NYLEPAY_SANDBOX_ENABLED:false}

# Rate Limiting
rate.limit.enabled=true
rate.limit.requests-per-minute=100

# M-Pesa B2B (Till/Paybill/Pochi) callback URL
mpesa.b2b-result-url=${MPESA_B2B_RESULT_URL:https://yourdomain.com/api/payments/webhook/mpesa/b2b}

# Transaction Limits
transaction.deposit.min.ksh=10
transaction.deposit.max.ksh=150000
transaction.withdrawal.min.ksh=100
transaction.withdrawal.max.ksh=70000
transaction.daily.limit.ksh=300000

# Exchange Rates (Fallback - in production use API)
exchange.rate.usd.ksh=128
exchange.rate.eur.usd=1.1
exchange.rate.gbp.usd=1.3
exchange.rate.eth.usd=3000
exchange.rate.btc.usd=45000

# Scheduled Tasks
scheduled.transaction.timeout.check=0 0/30 * * * * # Every 30 minutes
scheduled.exchange.rate.update=0 0 * * * * # Every hour

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# API Keys (Dummy values for development/testing)
coingecko.api-key=dummy-coingecko-key
binance.api-key=dummy-binance-key
binance.secret-key=dummy-binance-secret

# Bybit API (set real keys in production environment variables)
bybit.api-key=
bybit.secret-key=

# ── CEX Live Mode ───────────────────────────────────────────────────────────
# false = all CEX and on-chain operations are simulated (safe for development)
# true  = real money moves — enable ONLY in production with real API keys
cex.live-mode=false

# ── On-Chain / Multi-Chain EVM ──────────────────────────────────────────────
# Supported chains: ETHEREUM, POLYGON, ARBITRUM, BASE (all EVM / secp256k1)

# Minimum block confirmations before a deposit is credited (6 = industry standard)
crypto.min-confirmations=6

# Webhook HMAC secret — set this to the value from your Moralis/Alchemy stream config
crypto.webhook.secret=changeme-set-in-production

# RPC endpoints — replace demo keys with Alchemy/Infura API key URLs in production
crypto.rpc.ethereum=https://eth-mainnet.g.alchemy.com/v2/your-alchemy-key
crypto.rpc.polygon=https://polygon-mainnet.g.alchemy.com/v2/your-alchemy-key
crypto.rpc.arbitrum=https://arb-mainnet.g.alchemy.com/v2/your-alchemy-key
crypto.rpc.base=https://mainnet.base.org

# ── ERC-20 Token Contract Addresses (Ethereum mainnet) ──────────────────────
# USDT — battle-tested, most liquid stablecoin
crypto.contract.usdt=0xdAC17F958D2ee523a2206206994597C13D831ec7
# USDC — Circle, monthly-audited, regulatory-grade
crypto.contract.usdc=0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48
# DAI  — MakerDAO, decentralised, formally-verified collateral system
crypto.contract.dai=0x6B175474E89094C44Da98b954EedeAC495271d0F

# ── Flutterwave (Bank Transfers) ─────────────────────────────────────────────
# Set real values via environment variables in production: FLUTTERWAVE_SECRET_KEY etc.
flutterwave.secret-key=${FLUTTERWAVE_SECRET_KEY:dummy-flutterwave-key}
flutterwave.public-key=${FLUTTERWAVE_PUBLIC_KEY:}
flutterwave.encryption-key=${FLUTTERWAVE_ENC_KEY:}
# Webhook secret: copy this from Flutterwave Dashboard → Settings → Webhooks → Verif Hash Secret
flutterwave.webhook-secret=${FLUTTERWAVE_WEBHOOK_SECRET:changeme-set-in-production}
# false = simulate all bank transfers (safe for development)
# true  = real bank transfers via Flutterwave — enable ONLY in production
flutterwave.live-mode=false

# ── Supported Kenyan Banks (Flutterwave bank codes) ──────────────────────────
# KCB Bank Kenya              : KCB
# Equity Bank                 : EQB  (also supports USSD 247)
# Co-operative Bank           : COO
# NCBA Bank                   : NCBA
# Absa Bank Kenya             : ABS
# Diamond Trust Bank          : DTB
# I&M Bank                    : IMB
# Standard Chartered          : SCB
# Family Bank                 : FAM
# Stanbic Bank                : STB
# NIC Bank (now NCBA)         : NIC
# Bank of Africa              : BOA
# Gulf African Bank           : GAB
# First Community Bank        : FCB
# Consolidated Bank           : CNS
# These codes are used in BankLinkRequest.bankCode and WithdrawalRequest bank routing.

# NylePay bank collection account shown to customers for bank -> wallet settlements
nylepay.bank.collection.bank-name=NylePay Settlement Bank
nylepay.bank.collection.bank-code=NYP001
nylepay.bank.collection.account-name=NylePay Limited
nylepay.bank.collection.account-number=1234567890
nylepay.bank.collection.swift-code=NYPWKENA

# ── Card Payments (Visa/Mastercard) ──────────────────────────────────────────
# Paystack (Primary for Africa)
paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_mock}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:pk_test_mock}
paystack.webhook-secret=${PAYSTACK_WEBHOOK_SECRET:mock-webhook-secret}
paystack.live-mode=false

# Stripe (International / USD)
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_mock}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_mock}
stripe.live-mode=false

# ── KYC & AML Compliance ─────────────────────────────────────────────────────
# Smile Identity (Kenya/Africa KYC provider)
kyc.smile.partner-id=${SMILE_PARTNER_ID:}
kyc.smile.api-key=${SMILE_API_KEY:}
kyc.smile.live-mode=false
# CBK requirement: max total unverified transactions
kyc.monthly-limit-unverified-kes=70000

# ComplyAdvantage / Refinitiv (AML Sanctions Screening)
aml.complyadvantage.api-key=${COMPLYADVANTAGE_API_KEY:}
aml.live-mode=false

# ── Merchant Gateway ─────────────────────────────────────────────────────────
# Default NylePay fee percentage applied to merchant transactions
merchant.fee-percent=1.5
# Delay before funds move from merchant internal wallet to external bank (T+1 fallback)
merchant.settlement-delay-days=1
