# ─── LOCAL DEVELOPMENT PROFILE ────────────────────────────────────────────────
# Active when Spring Boot is started with: -Dspring-boot.run.profiles=local
# or:  SPRING_PROFILES_ACTIVE=local
#
# This profile points to your LOCAL PostgreSQL instance (not Neon Cloud).
# Your local DB already has the user:
#   email: fidel@nylepay.com | password: (bcrypt hash stored) | mpesa: 254712345678
#
# To start the backend with this profile (PowerShell):
#   $env:SPRING_PROFILES_ACTIVE="local"; ./mvnw spring-boot:run
# Or:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# ──────────────────────────────────────────────────────────────────────────────

# ── Local PostgreSQL ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/nylepay
spring.datasource.username=postgres
spring.datasource.password=5638
spring.jpa.hibernate.ddl-auto=update

# ── No Redis in local dev: use simple in-memory cache ────────────────────────
spring.cache.type=none
spring.data.redis.repositories.enabled=false

# ── Sandbox mode ON by default for local dev ─────────────────────────────────
nylepay.sandbox.enabled=true

# ── Disable expensive external services locally ───────────────────────────────
# All payment gateways run in simulation mode (cex.live-mode=false already)
# No real emails sent — log email content to console instead
resend.api-key=local-dev-no-email

# ── Relaxed logging for dev ───────────────────────────────────────────────────
logging.level.com.nyle.nylepay=DEBUG
logging.level.org.springframework.web=DEBUG

# ── Allow H2 console (optional) ───────────────────────────────────────────────
# spring.h2.console.enabled=true

# ── CORS: allow all Vite dev-server ports ────────────────────────────────────
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8080,http://127.0.0.1:5500,https://nylepay.com
